<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Palatino Linotype','Book Antiqua',Georgia,'Times New Roman',serif">
  <title>Bottega — an operating model for AI-agent projects</title>
  <desc>A warm parchment workshop sign: a maker's-mark roundel showing one node linked to three (manager and departments), the serif word Bottega, a tagline, and MIT, Built for Claude Code, and the repository URL.</desc>

  <rect x="0" y="0" width="1280" height="640" fill="#EFE4CB"/>
  <rect x="40" y="40" width="1200" height="560" fill="#ECE0C4"/>
  <rect x="40" y="40" width="1200" height="560" fill="none" stroke="#5B4632" stroke-width="3"/>
  <rect x="52" y="52" width="1176" height="536" fill="none" stroke="#B25B36" stroke-width="1.2"/>

  <polygon points="52,46 58,52 52,58 46,52" fill="#B25B36"/>
  <polygon points="1228,46 1234,52 1228,58 1222,52" fill="#B25B36"/>
  <polygon points="52,582 58,588 52,594 46,588" fill="#B25B36"/>
  <polygon points="1228,582 1234,588 1228,594 1222,588" fill="#B25B36"/>

  <circle cx="640" cy="112" r="52" fill="#ECE0C4" stroke="#B25B36" stroke-width="3"/>
  <circle cx="640" cy="112" r="45" fill="none" stroke="#B25B36" stroke-width="1"/>
  <line x1="640" y1="92" x2="620" y2="132" stroke="#4A3826" stroke-width="1.4"/>
  <line x1="640" y1="92" x2="640" y2="132" stroke="#4A3826" stroke-width="1.4"/>
  <line x1="640" y1="92" x2="660" y2="132" stroke="#4A3826" stroke-width="1.4"/>
  <circle cx="640" cy="92" r="6" fill="#4A3826"/>
  <circle cx="620" cy="132" r="5" fill="#4A3826"/>
  <circle cx="640" cy="132" r="5" fill="#4A3826"/>
  <circle cx="660" cy="132" r="5" fill="#4A3826"/>

  <text x="640" y="197" font-size="20" font-style="italic" letter-spacing="0.5" fill="#8A6E4E" text-anchor="middle">an operating model for AI-agent projects</text>

  <text x="640" y="318" font-size="118" font-weight="500" letter-spacing="1" fill="#3E2C1C" text-anchor="middle">Bottega</text>

  <line x1="468" y1="356" x2="608" y2="356" stroke="#B25B36" stroke-width="1.4"/>
  <line x1="672" y1="356" x2="812" y2="356" stroke="#B25B36" stroke-width="1.4"/>
  <polygon points="640,347 650,356 640,365 630,356" fill="#B25B36"/>

  <text x="640" y="411" font-size="30" font-style="italic" fill="#6B5238" text-anchor="middle">One manager, specialized departments,</text>
  <text x="640" y="453" font-size="30" font-style="italic" fill="#6B5238" text-anchor="middle">and a method that carries to your next project.</text>

  <text x="640" y="557" font-size="22" letter-spacing="0.5" fill="#8A6E4E" text-anchor="middle">MIT <tspan fill="#B25B36">&#183;</tspan> Built for Claude Code <tspan fill="#B25B36">&#183;</tspan> github.com/Migliaa/Bottega</text>
