<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Segoe UI', Arial, sans-serif">
  <title>Bottega — an open operating model for AI-agent projects</title>
  <desc>Title card: the word Bottega over a tagline, with MIT and Built for Claude Code, and a small manager-to-departments node diagram on the right.</desc>

  <rect x="0" y="0" width="1280" height="640" fill="#17130F"/>
  <rect x="0" y="0" width="14" height="640" fill="#D9783C"/>
  <rect x="44" y="44" width="1192" height="552" fill="none" stroke="#2C261E" stroke-width="2" rx="16"/>

  <text x="98" y="152" font-size="28" font-weight="400" fill="#B7A48F">An open operating model for AI-agent projects</text>

  <text x="94" y="292" font-size="132" font-weight="600" letter-spacing="-2" fill="#F5EEE4">Bottega<tspan fill="#D9783C">.</tspan></text>

  <text x="98" y="374" font-size="33" font-weight="400" fill="#EADFD2">One manager. Specialized departments.</text>
  <text x="98" y="420" font-size="33" font-weight="400" fill="#EADFD2">A method that carries to your next project.</text>

  <text x="98" y="524" font-size="25" font-weight="400" fill="#9C8C79">MIT <tspan fill="#D9783C">&#8226;</tspan> Built for Claude Code <tspan fill="#D9783C">&#8226;</tspan> github.com/Migliaa/Bottega</text>

  <line x1="1095" y1="208" x2="1095" y2="268" stroke="#C56A33" stroke-width="1.5" opacity="0.65"/>
  <line x1="1095" y1="332" x2="1015" y2="405" stroke="#C56A33" stroke-width="1.5" opacity="0.65"/>
  <line x1="1095" y1="332" x2="1095" y2="405" stroke="#C56A33" stroke-width="1.5" opacity="0.65"/>
  <line x1="1095" y1="332" x2="1175" y2="405" stroke="#C56A33" stroke-width="1.5" opacity="0.65"/>

  <rect x="1010" y="150" width="170" height="58" rx="10" fill="#1E1812" stroke="#8A7257" stroke-width="1.5"/>
  <text x="1095" y="186" font-size="20" font-weight="400" fill="#EADFD2" text-anchor="middle">committente</text>

  <rect x="1000" y="268" width="190" height="64" rx="10" fill="#241B12" stroke="#D9783C" stroke-width="2.5"/>
  <text x="1095" y="307" font-size="22" font-weight="500" fill="#F5EEE4" text-anchor="middle">manager</text>

  <rect x="980" y="405" width="70" height="54" rx="9" fill="#1E1812" stroke="#6E5B45" stroke-width="1.5"/>
  <rect x="1060" y="405" width="70" height="54" rx="9" fill="#1E1812" stroke="#6E5B45" stroke-width="1.5"/>
  <rect x="1140" y="405" width="70" height="54" rx="9" fill="#1E1812" stroke="#6E5B45" stroke-width="1.5"/>
  <text x="1095" y="497" font-size="19" font-weight="400" fill="#9C8C79" text-anchor="middle">departments</text>
